<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Gear &amp; Nutrition — Crew, by RaceDay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo-group">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </a>
      <nav class="nav">
        <a href="dashboard.html">Dashboard</a>
      </nav>
      <button type="button" class="btn btn-secondary btn-nav" id="sign-out-btn">Sign Out</button>
    </div>
  </header>

  <main class="race-page">
    <div class="container">
      <h1 class="race-heading">My Gear &amp; Nutrition</h1>
      <p class="auth-sub">
        Build your personal packing list once, then pull items straight into any aid station drop bag.
      </p>

      <div class="gear-columns">
        <section class="gear-section">
          <h2 class="elevation-heading">Gear</h2>
          <form class="gear-add-form" id="gear-add-form">
            <input class="auth-input" type="text" id="gear-input" placeholder="e.g. Headlamp" />
            <button type="submit" class="drop-bag-add-btn">Add</button>
          </form>
          <p class="field-hint" id="gear-status"></p>
          <ul class="gear-list" id="gear-list"></ul>
        </section>

        <section class="gear-section">
          <h2 class="elevation-heading">Nutrition</h2>
          <form class="gear-add-form nutrition-add-form" id="nutrition-add-form">
            <input class="auth-input" type="text" id="nutrition-input" placeholder="e.g. Gu Energy Gel" />
            <input class="auth-input nutrition-macro-input" type="number" id="nutrition-calories-input" placeholder="Cal" min="0" />
            <input class="auth-input nutrition-macro-input" type="number" id="nutrition-carbs-input" placeholder="Carbs (g)" min="0" />
            <button type="submit" class="drop-bag-add-btn">Add</button>
          </form>
          <p class="field-hint" id="nutrition-status"></p>
          <ul class="gear-list" id="nutrition-list"></ul>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="logo-group">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </span>
      <p>&copy; 2026 RaceDay. Crew is built for the people who keep runners moving forward.</p>
    </div>
  </footer>

  <script type="module">
    import { supabase } from './supabase-client.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
    }

    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    function buildItemRow(item, listEl) {
      const li = document.createElement('li');
      li.className = 'gear-item';

      function renderDisplay() {
        li.innerHTML = '';

        const textWrap = document.createElement('span');
        textWrap.className = 'gear-item-text';

        const span = document.createElement('span');
        span.textContent = item.name;
        textWrap.appendChild(span);

        if (item.category === 'nutrition') {
          const macros = document.createElement('span');
          macros.className = 'gear-item-macros';
          const parts = [];
          if (item.calories) parts.push(`${item.calories} cal`);
          if (item.carbs) parts.push(`${item.carbs}g carbs`);
          macros.textContent = parts.length ? parts.join(' · ') : 'No calories/carbs set';
          textWrap.appendChild(macros);
        }

        const actions = document.createElement('span');
        actions.className = 'gear-item-actions';

        const editBtn = document.createElement('button');
        editBtn.type = 'button';
        editBtn.className = 'crew-invite-btn';
        editBtn.textContent = 'Edit';
        editBtn.addEventListener('click', renderEdit);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'drop-bag-remove';
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', `Remove ${item.name}`);
        removeBtn.addEventListener('click', async () => {
          if (!confirm(`Remove "${item.name}" from your list? This also removes it from any drop bags using it.`)) return;
          await supabase.from('user_items').delete().eq('id', item.id);
          li.remove();
        });

        actions.append(editBtn, removeBtn);
        li.append(textWrap, actions);
      }

      function renderEdit() {
        li.innerHTML = '';
        li.classList.add('gear-item-editing');

        const editWrap = document.createElement('div');
        editWrap.className = 'gear-item-edit-wrap';

        const nameInput = document.createElement('input');
        nameInput.type = 'text';
        nameInput.className = 'auth-input';
        nameInput.value = item.name;
        editWrap.appendChild(nameInput);

        let caloriesInput = null;
        let carbsInput = null;
        if (item.category === 'nutrition') {
          caloriesInput = document.createElement('input');
          caloriesInput.type = 'number';
          caloriesInput.min = '0';
          caloriesInput.placeholder = 'Cal';
          caloriesInput.className = 'auth-input nutrition-macro-input';
          caloriesInput.value = item.calories ?? '';

          carbsInput = document.createElement('input');
          carbsInput.type = 'number';
          carbsInput.min = '0';
          carbsInput.placeholder = 'Carbs (g)';
          carbsInput.className = 'auth-input nutrition-macro-input';
          carbsInput.value = item.carbs ?? '';

          editWrap.append(caloriesInput, carbsInput);
        }

        const saveBtn = document.createElement('button');
        saveBtn.type = 'button';
        saveBtn.className = 'drop-bag-add-btn';
        saveBtn.textContent = 'Save';
        saveBtn.addEventListener('click', async () => {
          const updates = { name: nameInput.value.trim() || item.name };
          if (item.category === 'nutrition') {
            updates.calories = caloriesInput.value ? parseFloat(caloriesInput.value) : null;
            updates.carbs = carbsInput.value ? parseFloat(carbsInput.value) : null;
          }
          const { data, error } = await supabase.from('user_items').update(updates).eq('id', item.id).select().single();
          if (!error && data) {
            item.name = data.name;
            item.calories = data.calories;
            item.carbs = data.carbs;
            li.classList.remove('gear-item-editing');
            renderDisplay();
          }
        });

        const cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'crew-invite-btn';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.addEventListener('click', () => {
          li.classList.remove('gear-item-editing');
          renderDisplay();
        });

        editWrap.append(saveBtn, cancelBtn);
        li.appendChild(editWrap);
      }

      renderDisplay();
      listEl.appendChild(li);
    }

    function wireCategory(category, formId, inputId, statusId, listId, macroInputIds) {
      const form = document.getElementById(formId);
      const input = document.getElementById(inputId);
      const status = document.getElementById(statusId);
      const listEl = document.getElementById(listId);
      const caloriesInput = macroInputIds ? document.getElementById(macroInputIds.calories) : null;
      const carbsInput = macroInputIds ? document.getElementById(macroInputIds.carbs) : null;

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = input.value.trim();
        if (!name) return;

        status.textContent = '';
        status.className = 'field-hint';

        const payload = { user_id: session.user.id, category, name };
        if (caloriesInput) payload.calories = caloriesInput.value ? parseFloat(caloriesInput.value) : null;
        if (carbsInput) payload.carbs = carbsInput.value ? parseFloat(carbsInput.value) : null;

        const { data, error } = await supabase
          .from('user_items')
          .insert(payload)
          .select()
          .single();

        if (error) {
          status.textContent = error.code === '23505' ? 'Already on your list.' : error.message;
          status.classList.add('field-hint-error');
        } else {
          input.value = '';
          if (caloriesInput) caloriesInput.value = '';
          if (carbsInput) carbsInput.value = '';
          buildItemRow(data, listEl);
        }
      });
    }

    wireCategory('gear', 'gear-add-form', 'gear-input', 'gear-status', 'gear-list');
    wireCategory('nutrition', 'nutrition-add-form', 'nutrition-input', 'nutrition-status', 'nutrition-list', {
      calories: 'nutrition-calories-input',
      carbs: 'nutrition-carbs-input',
    });

    const { data: items } = await supabase
      .from('user_items')
      .select('id, category, name, calories, carbs')
      .eq('user_id', session.user.id)
      .order('name', { ascending: true });

    (items || []).forEach((item) => {
      const listEl = document.getElementById(item.category === 'gear' ? 'gear-list' : 'nutrition-list');
      buildItemRow(item, listEl);
    });
  </script>

</body>
</html>
