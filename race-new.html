<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Race — Crew, by RaceDay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-shell">
    <aside class="app-sidebar">
      <a href="index.html" class="logo-group sidebar-logo">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">My Races</a>
        <a href="race-search.html" class="sidebar-link">Find a Race</a>
        <a href="gear.html" class="sidebar-link">My Gear</a>
        <a href="account.html" class="sidebar-link">Account</a>
      </nav>
      <button type="button" class="btn btn-secondary sidebar-signout" id="sign-out-btn">Sign Out</button>
    </aside>

  <main class="app-main auth-page topo-bg">
    <div class="container">
      <div class="auth-card form-card">
        <p class="eyebrow center">New Race</p>
        <h1 class="auth-title">Set up your race.</h1>
        <p class="auth-sub">
          Add the basics, then upload the course GPX &mdash; we'll map it and calculate
          distance and elevation automatically.
        </p>

        <form id="race-form" class="auth-form">
          <label class="auth-label" for="race-name">Race name</label>
          <input class="auth-input" type="text" id="race-name" placeholder="Wasatch 100" required />

          <label class="auth-label" for="race-date">Race date</label>
          <input class="auth-input" type="date" id="race-date" required />

          <label class="auth-label" for="race-location">Location</label>
          <input class="auth-input" type="text" id="race-location" placeholder="Layton, UT" />

          <label class="auth-label" for="gpx-file">Course GPX file</label>
          <input class="auth-input" type="file" id="gpx-file" accept=".gpx" required />
          <p class="field-hint" id="gpx-summary"></p>

          <button type="submit" class="btn btn-primary auth-submit" id="submit-btn">
            Create Race
          </button>

          <p class="auth-status" id="form-status" aria-live="polite"></p>
        </form>
      </div>
    </div>
  </main>
  </div>

  <script type="module">
    import { supabase } from './supabase-client.js';
    import { parseGpx } from './gpx-parser.js';

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      window.location.href = 'login.html';
    }

    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    const gpxInput = document.getElementById('gpx-file');
    const gpxSummary = document.getElementById('gpx-summary');
    let parsedTrack = null;

    gpxInput.addEventListener('change', async () => {
      const file = gpxInput.files[0];
      parsedTrack = null;
      gpxSummary.textContent = '';
      gpxSummary.classList.remove('field-hint-error');

      if (!file) return;

      try {
        const text = await file.text();
        parsedTrack = parseGpx(text);
        gpxSummary.textContent = `${parsedTrack.totalDistanceMiles} mi · +${parsedTrack.elevationGainFt} ft / -${parsedTrack.elevationLossFt} ft · ${parsedTrack.points.length} points`;
      } catch (err) {
        gpxSummary.textContent = err.message;
        gpxSummary.classList.add('field-hint-error');
      }
    });

    const form = document.getElementById('race-form');
    const statusEl = document.getElementById('form-status');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      if (!parsedTrack) {
        statusEl.textContent = 'Choose a valid GPX file before creating the race.';
        statusEl.className = 'auth-status auth-status-error';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating...';
      statusEl.textContent = '';
      statusEl.className = 'auth-status';

      const { data: { session } } = await supabase.auth.getSession();

      const { data: race, error: raceError } = await supabase
        .from('races')
        .insert({
          name: document.getElementById('race-name').value.trim(),
          race_date: document.getElementById('race-date').value,
          location: document.getElementById('race-location').value.trim(),
          created_by: session.user.id,
          total_distance_miles: parsedTrack.totalDistanceMiles,
          elevation_gain_ft: parsedTrack.elevationGainFt,
          elevation_loss_ft: parsedTrack.elevationLossFt,
        })
        .select()
        .single();

      if (raceError) {
        statusEl.textContent = raceError.message;
        statusEl.classList.add('auth-status-error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Race';
        return;
      }

      const { error: trackError } = await supabase
        .from('race_tracks')
        .insert({ race_id: race.id, points: parsedTrack.points });

      if (trackError) {
        statusEl.textContent = trackError.message;
        statusEl.classList.add('auth-status-error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Race';
        return;
      }

      await supabase
        .from('race_participants')
        .insert({ race_id: race.id, user_id: session.user.id });

      window.location.href = `race.html?id=${race.id}`;
    });

    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar-link').forEach((link) => {
      if (link.getAttribute('href') === currentPage) link.classList.add('is-active');
    });
  </script>

</body>
</html>
