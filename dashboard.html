<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Crew, by RaceDay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="app-shell">
    <aside class="app-sidebar">
      <a href="index.html" class="logo-group sidebar-logo">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </a>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="sidebar-link">My Races</a>
        <a href="race-search.html" class="sidebar-link">Find a Race</a>
        <a href="gear.html" class="sidebar-link">My Gear</a>
        <a href="account.html" class="sidebar-link">Account</a>
      </nav>
      <button type="button" class="btn btn-secondary sidebar-signout" id="sign-out-btn">Sign Out</button>
    </aside>

  <main class="app-main dashboard-page topo-bg">
    <div class="container">
      <div class="auth-card dashboard-card" id="dashboard-card" hidden>
        <p class="eyebrow center" id="account-type-label">Participant</p>
        <h1 class="auth-title" id="dashboard-heading">Welcome back.</h1>
        <p class="auth-sub" id="dashboard-sub">
          This is the start of your Crew dashboard. More is on the way.
        </p>
        <div class="hero-actions dashboard-actions">
          <a href="race-search.html" class="btn btn-primary">Find a Race</a>
          <a href="race-new.html" class="btn btn-secondary">Create a Race</a>
        </div>
      </div>
      <p class="auth-status" id="loading-status">Loading your dashboard...</p>

      <div class="race-grid" id="race-grid" hidden>
        <h2 class="races-heading">Your Races</h2>
        <div class="race-cards" id="race-cards"></div>
      </div>
    </div>
  </main>
  </div>

  <script type="module">
    import { supabase } from './supabase-client.js';

    const loadingStatus = document.getElementById('loading-status');
    const dashboardCard = document.getElementById('dashboard-card');

    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      window.location.href = 'login.html';
    } else {
      const { data: profile, error } = await supabase
        .from('profiles')
        .select('full_name, email, account_type')
        .eq('id', session.user.id)
        .single();

      if (error || !profile) {
        loadingStatus.textContent = 'Could not load your profile. Try signing in again.';
      } else {
        const isDirector = profile.account_type === 'race_director';
        document.getElementById('account-type-label').textContent = isDirector
          ? 'Race Director'
          : 'Runner / Crew';
        document.getElementById('dashboard-heading').textContent = `Welcome, ${profile.full_name || 'there'}.`;
        document.getElementById('dashboard-sub').textContent = isDirector
          ? 'Your race, aid station, and crew assignment tools will show up here.'
          : 'Your race plan, aid station details, and crew tools will show up here.';

        loadingStatus.hidden = true;
        dashboardCard.hidden = false;

        const { data: participations } = await supabase
          .from('race_participants')
          .select('race:races(id, name, race_date, location, total_distance_miles)')
          .eq('user_id', session.user.id);

        const races = (participations || [])
          .map((p) => p.race)
          .filter(Boolean)
          .sort((a, b) => (a.race_date || '').localeCompare(b.race_date || ''));

        if (races.length > 0) {
          const escapeHtml = (str) =>
            String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

          const raceCards = document.getElementById('race-cards');
          raceCards.innerHTML = races
            .map((race) => `
              <a class="race-card" href="race.html?id=${encodeURIComponent(race.id)}">
                <span class="mock-tag">${race.race_date ? new Date(race.race_date + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : 'Date TBD'}</span>
                <span class="mock-title">${escapeHtml(race.name)}</span>
                <span class="mock-meta">${escapeHtml(race.location)}${race.total_distance_miles ? ` &middot; ${race.total_distance_miles} mi` : ''}</span>
              </a>
            `)
            .join('');
          document.getElementById('race-grid').hidden = false;
        }
      }
    }

    document.getElementById('sign-out-btn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = 'login.html';
    });

    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.sidebar-link').forEach((link) => {
      if (link.getAttribute('href') === currentPage) link.classList.add('is-active');
    });
  </script>

</body>
</html>
