<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Crew, by RaceDay</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo-group">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </a>
    </div>
  </header>

  <main class="auth-page topo-bg">
    <div class="container">
      <div class="auth-card">
        <p class="eyebrow center">Reset Password</p>
        <h1 class="auth-title">Set a new password</h1>
        <p class="auth-sub" id="reset-sub">Choose a new password for your account.</p>

        <form id="reset-form" class="auth-form" hidden>
          <label class="auth-label" for="reset-email">Email</label>
          <input class="auth-input" type="email" id="reset-email" readonly />

          <label class="auth-label" for="new-password">New password</label>
          <input class="auth-input" type="password" id="new-password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required />

          <label class="auth-label" for="confirm-password">Confirm password</label>
          <input class="auth-input" type="password" id="confirm-password" placeholder="Re-enter your password" autocomplete="new-password" minlength="6" required />

          <button type="submit" class="btn btn-primary auth-submit" id="reset-submit-btn">
            Set New Password
          </button>

          <p class="auth-status" id="reset-status" aria-live="polite"></p>
        </form>

        <div id="invalid-link-message" hidden>
          <p class="auth-sub">
            This password reset link is invalid or has expired.
          </p>
          <a href="login.html" class="btn btn-primary auth-submit">Request a New Link</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="logo-group">
        <span class="logo">Race<span>Day</span></span>
        <span class="badge">Crew</span>
      </span>
      <p>&copy; 2026 RaceDay. Crew is built for the people who keep runners moving forward.</p>
    </div>
  </footer>

  <script type="module">
    import { supabase } from './supabase-client.js';

    const show = (el) => { el.hidden = false; el.style.display = ''; };
    const hide = (el) => { el.hidden = true; el.style.display = 'none'; };

    const form = document.getElementById('reset-form');
    const emailInput = document.getElementById('reset-email');
    const newPasswordInput = document.getElementById('new-password');
    const confirmPasswordInput = document.getElementById('confirm-password');
    const statusEl = document.getElementById('reset-status');
    const submitBtn = document.getElementById('reset-submit-btn');
    const invalidMsg = document.getElementById('invalid-link-message');

    const { data: { session } } = await supabase.auth.getSession();

    if (!session) {
      hide(form);
      show(invalidMsg);
    } else {
      emailInput.value = session.user.email || '';
      show(form);
      hide(invalidMsg);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = '';
      statusEl.className = 'auth-status';

      if (newPasswordInput.value !== confirmPasswordInput.value) {
        statusEl.textContent = 'Passwords do not match.';
        statusEl.classList.add('auth-status-error');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      const { error } = await supabase.auth.updateUser({ password: newPasswordInput.value });

      submitBtn.disabled = false;
      submitBtn.textContent = 'Set New Password';

      if (error) {
        statusEl.textContent = error.message;
        statusEl.classList.add('auth-status-error');
      } else {
        await supabase.auth.signOut();
        window.location.href = 'login.html?reset=success';
      }
    });
  </script>

</body>
</html>
